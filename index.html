<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      name="description"
      content="Uma experiência digital cinematográfica para imóveis de alto padrão."
    />

    <title>Estate Experience</title>

    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/animations.css" />
  </head>

  <body>
    <main>
      <section class="hero" id="inicio">
        <div class="hero__media">
            <img
            class="hero_image"
            src="./assets/images/hero-piscina.jpg"
            alt="Piscina e área de lazer do empreendimento Douro"
            />
        </div>

        <div class="hero__overlay"></div>

        <div class="hero__content">
          <p class="hero__location">Centro · Brusque · Santa Catarina</p>
          
          <h1 class="hero__title">
            Douro
            <span>Residence</span>
          </h1>
          
          <p class="hero__description">
            Uma arquitetura atemporal para uma experiência de vida singular.
          </p>
        </div>

        <div class="hero__scroll">
          <span>Explore</span>
          <span class="hero__scroll-line"></span>
        </div>
      </section>

      <section class="property-overview" aria-label="Informações do imóvel">
  <article class="property-stat">
    <span class="property-stat__value">108,80</span>
    <span class="property-stat__label">m² privativos</span>
  </article>

  <article class="property-stat">
    <span class="property-stat__value">02</span>
    <span class="property-stat__label">suítes</span>
  </article>

  <article class="property-stat">
    <span class="property-stat__value">02</span>
    <span class="property-stat__label">vagas</span>
  </article>

  <article class="property-stat">
    <span class="property-stat__value">1,049</span>
    <span class="property-stat__label">milhão de reais</span>
  </article>
</section>

      <section class="introduction" id="experiencia">
        <p class="section-label">A experiência</p>

        <h2 class="introduction__title">
          Não mostramos apenas um imóvel.
          <span>Convidamos você a imaginar uma nova vida.</span>
        </h2>
      </section>
    </main>

    <script src="./js/main.js"></script>
    <script src="./js/scroll.js"></script>
    <script src="./js/animations.js"></script>
  </body>
</html>
